<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام التحقق من الشهادات | International College of Entrepreneurship</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 100%; border-top: 5px solid #1e3a8a; }
        input { width: 90%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; text-align: center; }
        button { background-color: #1e3a8a; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; width: 100%; }
        button:hover { background-color: #152b69; }
        #result { margin-top: 20px; text-align: right; padding: 15px; background: #e8f4fd; border-radius: 5px; display: none; }
        .success-icon { color: green; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>التحقق من الشهادات</h2>
    <p style="color: #666; font-size: 14px;">أدخل الرقم المرجعي للشهادة للتحقق من صحتها</p>
    
    <input type="text" id="refInput" placeholder="مثال: ICE-1001">
    <button onclick="verifyCertificate()">تحقق الآن</button>

    <div id="result"></div>
</div>

<script>
    // رابط ملف الـ CSV الذي قمت بتوليده من جوجل شيتس
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQzIWoz1zrtdBwT9rYmvQgGt8rjz2SIK0Z2IOt9MavvrZL548UajhqCmji5eIIHII1VOpI4rWx1pEzP/pub?gid=196238973&single=true&output=csv';

    function verifyCertificate() {
        const inputRef = document.getElementById('refInput').value.trim();
        const resultDiv = document.getElementById('result');
        
        if(!inputRef) {
            alert('الرجاء إدخال الرقم المرجعي');
            return;
        }

        resultDiv.style.display = 'none';
        resultDiv.innerHTML = 'جاري التحقق...';
        resultDiv.style.display = 'block';

        Papa.parse(csvUrl, {
            download: true,
            header: true,
            complete: function(results) {
                const data = results.data;
                const record = data.find(row => row.RefNumber === inputRef);

                if(record) {
                    resultDiv.innerHTML = `
                        <p class="success-icon">✓ شهادة موثقة ومعتمدة</p>
                        <p><strong>الاسم الثلاثي:</strong> ${record.StudentName}</p>
                        <p><strong>اسم البرنامج التدريبي:</strong> ${record.CourseName}</p>
                        <p><strong>مسمى الشهادة:</strong> ${record.CertificateType}</p>
                        <p><strong>الدولة:</strong> ${record.Country}</p>
                        <p><strong>توقيع المدرب:</strong> ${record.Signatory}</p>
                    `;
                    resultDiv.style.background = '#e8f4fd';
                } else {
                    resultDiv.innerHTML = `<p style="color: red; font-weight: bold;">❌ الرقم المرجعي غير صحيح أو غير مدرج في السجلات.</p>`;
                    resultDiv.style.background = '#fde8e8';
                }
            },
            error: function(err) {
                resultDiv.innerHTML = `<p style="color: red;">حدث خطأ في الاتصال بقاعدة البيانات، يرجى المحاولة لاحقاً.</p>`;
            }
        });
    }
</script>

</body>
</html>
